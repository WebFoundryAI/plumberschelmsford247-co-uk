<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to font origins (critical for FCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS prefetch for deferred third-party resources -->
    <link rel="dns-prefetch" href="//www.googletagmanager.com" />
    
    <!-- Preload critical font files (700=headings, 400=body) -->
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4bC0C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC0C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Hero background preload for LCP -->
    <link rel="preload" href="/src/assets/hero-bg.webp" as="image" type="image/webp" fetchpriority="high" />
    
    <!-- Google Fonts CSS - async load (non-blocking) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all';this.onload=null;" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
    
    <!-- Critical CSS - inlined for immediate FCP (above-the-fold only) -->
    <style>
      /* Reset */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
      body{font-family:'Outfit',system-ui,-apple-system,sans-serif;background:hsl(210 20% 98%);color:hsl(215 25% 15%);-webkit-font-smoothing:antialiased;line-height:1.5}
      
      /* Critical layout */
      .min-h-screen{min-height:100vh}
      .flex{display:flex}
      .flex-col{flex-direction:column}
      .items-center{align-items:center}
      .justify-between{justify-content:space-between}
      .justify-center{justify-content:center}
      .gap-2{gap:.5rem}
      .gap-3{gap:.75rem}
      .w-full{width:100%}
      .px-4{padding-left:1rem;padding-right:1rem}
      .py-16{padding-top:4rem;padding-bottom:4rem}
      .text-sm{font-size:.875rem}
      .text-xl{font-size:1.25rem}
      .text-4xl{font-size:2.25rem;line-height:2.5rem}
      .font-bold{font-weight:700}
      .font-medium{font-weight:500}
      .overflow-hidden{overflow:hidden}
      .relative{position:relative}
      
      /* Header */
      .sticky{position:sticky}
      .top-0{top:0}
      .z-50{z-index:50}
      .bg-primary{background:hsl(213 80% 35%)}
      .text-primary-foreground{color:#fff}
      .bg-card{background:#fff}
      .border-b{border-bottom-width:1px}
      .border-border{border-color:hsl(214 20% 88%)}
      
      /* Hero */
      .hero-section{background:linear-gradient(135deg,hsl(213 80% 30%),hsl(213 75% 20%))}
      .hero-overlay{background:linear-gradient(180deg,hsla(213 80% 15%/.9),hsla(213 80% 20%/.85))}
      .container-wide{max-width:80rem;margin-left:auto;margin-right:auto}
      
      /* Responsive */
      @media(min-width:768px){.md\:py-24{padding-top:6rem;padding-bottom:6rem}.md\:text-5xl{font-size:3rem;line-height:1}}
      @media(min-width:1024px){.lg\:text-6xl{font-size:3.75rem;line-height:1}.lg\:hidden{display:none}.lg\:flex{display:flex}}
      
      /* Skeleton loader - shows instantly before React hydrates */
      .skeleton-header{height:4rem;background:hsl(213 80% 35%)}
      .skeleton-hero{min-height:70vh;background:linear-gradient(135deg,hsl(213 80% 30%),hsl(213 75% 20%))}
      .skeleton-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
      
      /* Hide skeleton once React renders */
      #root:not(:empty) .initial-skeleton{display:none}
    </style>
    
    <!-- Fallback meta - react-helmet-async overrides per route -->
    <title>Blocked Drains Manchester | Expert Drain Services</title>
    <meta name="author" content="Blocked Drains Manchester" />
    <!-- DO NOT add static og:/twitter: tags here - they prevent per-page uniqueness -->
    <!-- All SEO meta tags (description, canonical, og:*, twitter:*) are managed by RouteSEOHead component -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- PWA meta tags -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1565a8" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Drain Help" />

    <meta name="geo.region" content="GB-MAN" />
    <meta name="geo.placename" content="Manchester" />
  </head>

  <body>
    <div id="root">
      <!-- Initial skeleton - visible before React hydrates, hidden after -->
      <div class="initial-skeleton">
        <div class="skeleton-header skeleton-pulse"></div>
        <div class="skeleton-hero skeleton-pulse" style="display:flex;align-items:center;justify-content:center;">
          <div style="text-align:center;color:white;padding:2rem;">
            <div style="font-size:2.5rem;font-weight:700;margin-bottom:1rem;">Blocked Drains Manchester</div>
            <div style="opacity:.8;">Loading...</div>
          </div>
        </div>
      </div>
      <!-- No-JS fallback -->
      <noscript>
        <style>.initial-skeleton{display:none}</style>
        <header style="background:hsl(213 80% 35%);padding:1rem;color:white;">
          <div style="max-width:80rem;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:1.25rem;">Blocked Drains Manchester</span>
            <a href="tel:0161 222 1234" style="color:hsl(45 95% 50%);font-weight:700;">0161 222 1234</a>
          </div>
        </header>
        <main style="background:linear-gradient(135deg,hsl(213 80% 30%),hsl(213 75% 20%));color:white;padding:4rem 1rem;text-align:center;">
          <h1 style="font-size:2.5rem;margin-bottom:1rem;">24/7 Emergency Drain Unblocking</h1>
          <p style="margin-bottom:2rem;opacity:0.9;">Fast, reliable drainage solutions across Greater Manchester</p>
          <a href="tel:0161 222 1234" style="display:inline-block;background:hsl(45 95% 50%);color:hsl(215 25% 12%);padding:1rem 2rem;border-radius:0.5rem;font-weight:700;text-decoration:none;">Call Now: 0161 222 1234</a>
        </main>
      </noscript>
    </div>
    <!-- Main app - type=module is deferred by default (non-blocking) -->
    <script type="module" src="/src/main.tsx"></script>
    <!-- GA4 - deferred until user interaction -->
    <script>
      (function(){
        'use strict';
        var loaded=false;
        function load(){
          if(loaded)return;
          loaded=true;
          var s=document.createElement('script');
          s.src='https://www.googletagmanager.com/gtag/js?id=G-ZBN7YE9HZJ';
          s.async=true;
          document.head.appendChild(s);
          window.dataLayer=window.dataLayer||[];
          function gtag(){window.dataLayer.push(arguments)}
          window.gtag=gtag;
          gtag('js',new Date());
          gtag('config','G-ZBN7YE9HZJ');
        }
        ['scroll','click','touchstart'].forEach(function(e){
          document.addEventListener(e,load,{once:true,passive:true});
        });
      })();
    </script>
  </body>
</html>
