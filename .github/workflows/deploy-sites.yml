          find "$TEMP_DIR/$DOMAIN" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$SITE_DIR"/* "$TEMP_DIR/$DOMAIN/"

          cd "$TEMP_DIR/$DOMAIN"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to deploy for $DOMAIN"
          else
            git commit -m "Update site content"
            git push origin main
            echo "Deployed $DOMAIN successfully"
          fi

          cd -
          rm -rf "$TEMP_DIR"

      - name: Deploy Plumbers Poole
        if: inputs.site == 'all' || inputs.site == 'plumberspoole.co.uk'
        env:
          GH_TOKEN: ${{ secrets.REPO_CREATE_TOKEN }}
        run: |
          DOMAIN="plumberspoole.co.uk"
          SITE_DIR="sites/$DOMAIN"

          if [ ! -d "$SITE_DIR" ]; then
            echo "Site directory not found: $SITE_DIR - skipping"
            exit 0
          fi

          echo "Deploying $DOMAIN..."

          TEMP_DIR=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/WebFoundryAI/$DOMAIN.git" "$TEMP_DIR/$DOMAIN"

          find "$TEMP_DIR/$DOMAIN" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$SITE_DIR"/* "$TEMP_DIR/$DOMAIN/"

          cd "$TEMP_DIR/$DOMAIN"
