      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Site(s) deployed: ${{ inputs.site }}" >> $GITHUB_STEP_SUMMARY
