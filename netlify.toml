# Redirects (www to non-www) - handles both http and https
[[redirects]]
  from = "https://www.manchesterblockeddrain.co.uk/*"
  to = "https://manchesterblockeddrain.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.manchesterblockeddrain.co.uk/*"
  to = "https://manchesterblockeddrain.co.uk/:splat"
  status = 301
  force = true


[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/api-lead"
  status = 200

[[redirects]]
  from = "/api/postcode-lookup"
  to = "/.netlify/functions/postcode-lookup"
  status = 200
