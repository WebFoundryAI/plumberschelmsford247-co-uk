# Netlify build configuration
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  IDEAL_POSTCODES_API_KEY = "iddqd"

[functions]
  node_bundler = "esbuild"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS - Force HTTPS for 2 years
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Referrer policy for privacy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # XSS Protection (legacy)
    X-XSS-Protection = "1; mode=block"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
    # Permissions Policy
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# Cache immutable assets (hashed files)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images with revalidation
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# HTML pages - cache for 1 day (static SSG site, safe to cache)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=43200"

# All page routes - cache for 1 day (pre-rendered static pages)
[[headers]]
  for = "/about/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=43200"

[[headers]]
  for = "/contact/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=43200"

[[headers]]
